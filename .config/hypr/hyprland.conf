# #############################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #############################################################################

# 是否显示警告信息
# autogenerated = 1

# 显示器设置
# monitor = name,resolution,position,scale
# name       显示器的名称 (使用 hyprctl monitors 命令获取)
# resolution 显示器的分辨率和刷新率  (使用 hyprctl monitors 命令获取)
# position   位置
# scale      缩放率 ( 1 表示未缩放)
# 专注于刷新率
# monitor=,highrr,auto,1
# 专注于分辨率
#monitor=,preferred,auto,1
# 自定义
monitor = eDP-1,2560x1600@60,auto,1.25

# 开机启动
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME
exec-once = exec-once = systemctl --user start hyprpolkitagent

exec-once = hypridle
exec-once = waybar
exec-once = dunst
exec-once = fcitx5 --replace -d
exec-once = swww-daemon

# 剪贴板
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# 脚本
exec-once = $HOME/.scripts/wallpaper.sh
exec-once = $HOME/.scripts/xdph.sh

# #############################################################################
# General
# #############################################################################

general {
    # 边框大小
    border_size = 2
    # 窗口与窗口之间的间隙(top, right, bottom, left)
    gaps_in = 5
    # 窗口与屏幕之间的间隙(top, right, bottom, left)
    gaps_out = 5
    # 活动窗口边框的颜色
    col.active_border = rgba(88c0d0ff) rgba(b48eadff) rgba(ebcb8bff) rgba(a3be8cff) 45deg
    # 非活动窗口边框的颜色
    col.inactive_border=0xff434c5e
    # 默认布局方式
    layout = dwindle
    # 点击或拖拽调整边框与间隙的大小
    resize_on_border = true
    # 关闭活动窗口，手动聚焦到指定的窗口
    no_focus_fallback = true

    snap {
            enabled = true
            window_gap = 5
            monitor_gap = 5
            respect_gaps = true
        }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
    new_on_top = true
}

cursor {
        no_hardware_cursors = true
}

# #############################################################################
# Decoration
# #############################################################################

decoration {
    rounding_power = 4.0
    rounding = 15

    blur {
        enabled = true
        size = 10
        passes = 3
        xray = true
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }
    # 窗口透明度
    active_opacity = 1.0
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
}

# #############################################################################
# Animations
# #############################################################################

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

# #############################################################################
# Input
# #############################################################################

input {
    touchpad {
        # 2指点击为右击
        clickfinger_behavior = true
        # 打字时，关闭触摸
        disable_while_typing = true
    }
}

# #############################################################################
# Gestures
# #############################################################################

gestures {
    # 3指任意滑动移动活动窗口
    gesture = 3, swipe, move
    # 4指水平滑动切换工作区
    gesture = 4, horizontal, workspace

    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# #############################################################################
# Device
# #############################################################################

device {
    name = ite-device(8910)-keyboard
}

# #############################################################################
# Misc
# #############################################################################

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    on_focus_under_fullscreen = 2
    session_lock_xray = true
    focus_on_activate = true
}

# #############################################################################

# 其他配置
source = $HOME/.config/hypr/config/envs.conf
source = $HOME/.config/hypr/config/bind.conf
source = $HOME/.config/hypr/config/rules.conf
